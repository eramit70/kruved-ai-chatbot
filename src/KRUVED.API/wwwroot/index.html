<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kruved AI Assistant</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Marked for Markdown parsing -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <!-- DOMPurify for HTML sanitization -->
    <script src="https://cdn.jsdelivr.net/npm/dompurify/dist/purify.min.js"></script>
    <!-- Custom CSS -->
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <i class="fa-solid fa-wand-magic-sparkles logo-icon"></i>
                    <span>Kruved AI</span>
                </div>
            </div>
            <div class="sidebar-search">
                <div class="search-box">
                    <i class="fa-solid fa-magnifying-glass search-icon"></i>
                    <input type="text" id="search-input" placeholder="Search chat history..." autocomplete="off" />
                </div>
            </div>
            <div class="sidebar-content">
                <div class="sidebar-section-title">Conversations</div>
                <div id="sessions-list" class="sessions-list">
                    <!-- Dynamic list of chat sessions -->
                </div>
                <div class="session-status">
                    <span class="status-indicator online"></span>
                    <span>Connected to API</span>
                </div>
            </div>
            <div class="sidebar-footer">
                <button id="new-chat-btn" class="btn btn-secondary">
                    <i class="fa-solid fa-plus"></i> New Chat
                </button>
            </div>
        </aside>

        <!-- Main Chat Area -->
        <main class="chat-area">
            <header class="chat-header">
                <div class="assistant-profile">
                    <div class="avatar">
                        <i class="fa-solid fa-robot"></i>
                    </div>
                    <div class="profile-details">
                        <h2>Kruved AI Assistant</h2>
                        <p class="status-text">Groq Llama 3.3 • Active</p>
                    </div>
                </div>
            </header>

            <!-- Messages Window -->
            <section class="messages-container" id="messages-container">
                <!-- Welcome Message -->
                <div class="message assistant">
                    <div class="avatar-sm">
                        <i class="fa-solid fa-robot"></i>
                    </div>
                    <div class="message-wrapper">
                        <div class="message-sender">APSRA Assistant</div>
                        <div class="message-bubble">
                            Hello! I am your APSRA AI assistant. How can I help you today?
                        </div>
                    </div>
                </div>
            </section>

            <!-- Input Bar -->
            <footer class="chat-input-container">
                <form id="chat-form" class="chat-form">
                    <input 
                        type="text" 
                        id="message-input" 
                        placeholder="Type a message..." 
                        autocomplete="off" 
                        required
                    />
                    <button type="submit" id="send-btn" class="btn btn-primary">
                        <i class="fa-solid fa-paper-plane"></i>
                    </button>
                </form>
            </footer>
        </main>
    </div>

    <!-- Custom JS -->
    <script src="index.js"></script>
</body>
</html>
